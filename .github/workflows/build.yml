name: Build & Release PDP-10 Emulator

on:
  push:
    branches: [main, develop]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Тип сборки'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

env:
  JAVA_VERSION:   '17'
  GRADLE_VERSION: '8.7'
  APK_PATH:       app/build/outputs/apk

# ─────────────────────────────────────────────────────────────────────────────

jobs:

# =============================================================================
# JOB 1: Build Debug APK
# =============================================================================
  build-debug:
    name: 🔧 Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      # ── Android SDK ──────────────────────────────────────────────────────────
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" \
            2>&1 | grep -v "^\[="
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "✅ ANDROID_HOME=$ANDROID_HOME"
          echo "✅ local.properties written"

      # ── Gradle wrapper ────────────────────────────────────────────────────────
      # We don't commit gradle-wrapper.jar (binary), so we generate it in CI.
      - name: 🐘 Install Gradle ${{ env.GRADLE_VERSION }} & generate wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: 📦 Generate gradlew wrapper (creates gradle-wrapper.jar)
        run: |
          gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }} --distribution-type bin
          chmod +x gradlew
          echo "✅ gradlew wrapper generated"
          ls -la gradlew gradle/wrapper/

      # ── Diagnostics ─────────────────────────────────────────────────────────
      - name: 🔍 Diagnose project (full output on failure)
        run: |
          echo "=== Environment ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          ./gradlew --version
          echo ""
          echo "=== local.properties ==="
          cat local.properties
          echo ""
          echo "=== Project files ==="
          find . -name "*.gradle" -o -name "AndroidManifest.xml" | head -20
          echo ""
          echo "=== Gradle project info ==="
          ./gradlew help --info 2>&1 | head -80

      # ── Build ────────────────────────────────────────────────────────────────
      - name: 🔢 Get version info
        id: version
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME=$(git describe --tags --always --dirty 2>/dev/null \
                         || echo "dev-${GITHUB_SHA::7}")
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME"  >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION_NAME ($VERSION_CODE)"

      - name: 🔧 Build Debug APK
        run: |
          ./gradlew assembleDebug \
            -Pandroid.injected.version.code=${{ steps.version.outputs.version_code }} \
            -Pandroid.injected.version.name=${{ steps.version.outputs.version_name }} \
            --stacktrace --info 2>&1 | tee build.log
          # tee writes to file AND stdout; exit code from gradlew is preserved via pipefail
        shell: bash

      - name: 📊 Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: 📋 Show APK info
        run: |
          APK=$(find ${{ env.APK_PATH }}/debug -name "*.apk" | head -1)
          ls -lh "$APK"

      - name: 🏷️ Rename APK
        run: |
          VERSION=${{ steps.version.outputs.version_name }}
          mv ${{ env.APK_PATH }}/debug/app-debug.apk \
             ${{ env.APK_PATH }}/debug/pdp10-emulator-debug-${VERSION}.apk

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pdp10-debug-apk
          path: ${{ env.APK_PATH }}/debug/*.apk
          retention-days: 30


# =============================================================================
# JOB 2: Lint (non-blocking)
# =============================================================================
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    needs: build-debug
    if: always()

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1 | grep -v "^\[="
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 🐘 Setup Gradle & generate wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: 📦 Generate gradlew
        run: |
          gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }} --distribution-type bin
          chmod +x gradlew

      - name: 🔍 Lint
        run: ./gradlew lint --stacktrace 2>&1 | tail -100
        continue-on-error: true

      - name: 📊 Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html
          retention-days: 7


# =============================================================================
# JOB 3: Build Release APK (только при теге)
# =============================================================================
  build-release:
    name: 🚀 Build Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release_type == 'release'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1 | grep -v "^\[="
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 🐘 Setup Gradle & generate wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: 📦 Generate gradlew
        run: |
          gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }} --distribution-type bin
          chmod +x gradlew

      - name: 🔢 Get version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG"                   >> $GITHUB_OUTPUT
          echo "version_name=${TAG#v}"      >> $GITHUB_OUTPUT
          echo "version_code=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: 🔍 Check keystore
        id: keystore_check
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "available=true"  >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⚠️  No keystore — APK will be unsigned"
          fi

      - name: 🔐 Decode Keystore
        if: steps.keystore_check.outputs.available == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks

      - name: 📝 Inject signing config
        if: steps.keystore_check.outputs.available == 'true'
        run: |
          cat >> app/build.gradle << 'EOF'
          android {
              signingConfigs {
                  release {
                      storeFile     file("${rootDir}/keystore.jks")
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias      System.getenv("KEY_ALIAS")
                      keyPassword   System.getenv("KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release { signingConfig signingConfigs.release }
              }
          }
          EOF

      - name: 🚀 Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.version.code=${{ steps.version.outputs.version_code }} \
            -Pandroid.injected.version.name=${{ steps.version.outputs.version_name }} \
            --stacktrace

      - name: 🏷️ Rename
        run: |
          find ${{ env.APK_PATH }}/release -name "*.apk" \
            -exec mv {} ${{ env.APK_PATH }}/release/pdp10-emulator-${{ steps.version.outputs.version_name }}.apk \;

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: pdp10-release-apk
          path: ${{ env.APK_PATH }}/release/pdp10-emulator-*.apk
          retention-days: 90


# =============================================================================
# JOB 4: GitHub Release
# =============================================================================
  github-release:
    name: 📢 GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 Download APK
        uses: actions/download-artifact@v4
        with:
          name: pdp10-release-apk
          path: release/

      - name: 📋 Changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV=$(git describe --tags --abbrev=0 ${TAG}^ 2>/dev/null || echo "")
          CHANGES=$([ -n "$PREV" ] \
            && git log ${PREV}..${TAG} --pretty=format:"- %s" --no-merges \
            || git log --pretty=format:"- %s" --no-merges -20)
          printf "## PDP-10 Emulator %s\n\n### Изменения\n%s\n\n### Установка\n1. Скачайте APK\n2. Настройки → Безопасность → Неизвестные источники\n3. Установите APK\n" \
            "$TAG" "$CHANGES" > CHANGELOG.md

      - name: 🎉 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       "PDP-10 Emulator ${{ github.ref_name }}"
          body_path:  CHANGELOG.md
          files:      release/*.apk
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
