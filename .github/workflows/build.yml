name: Build & Release PDP-10 Emulator

on:
  push:
    branches: [main, develop]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Тип сборки'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.6'
  APK_PATH: app/build/outputs/apk

jobs:

# =============================================================================
# JOB 1: Lint + Unit Tests
# =============================================================================
  test:
    name: 🧪 Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      # gradle/actions/setup-gradle сам скачивает нужную версию Gradle.
      # gradle-wrapper.jar в репозитории НЕ нужен — это и есть суть фикса.
      - name: 🐘 Setup Gradle ${{ env.GRADLE_VERSION }}
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: false

      - name: 🔍 Run Lint
        run: gradle lint --stacktrace
        continue-on-error: true

      - name: 📊 Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html
          retention-days: 7

      - name: 🧪 Run Unit Tests
        run: gradle testDebugUnitTest --stacktrace
        continue-on-error: true

      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 7


# =============================================================================
# JOB 2: Build Debug APK
# =============================================================================
  build-debug:
    name: 🔧 Build Debug APK
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: 🐘 Setup Gradle ${{ env.GRADLE_VERSION }}
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: 🔢 Get version info
        id: version
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME=$(git describe --tags --always --dirty 2>/dev/null || echo "dev-${GITHUB_SHA::7}")
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION_NAME ($VERSION_CODE)"

      - name: 🔧 Build Debug APK
        run: |
          gradle assembleDebug \
            -Pandroid.injected.version.code=${{ steps.version.outputs.version_code }} \
            -Pandroid.injected.version.name=${{ steps.version.outputs.version_name }} \
            --stacktrace

      - name: 📋 Show APK info
        run: |
          APK=$(find ${{ env.APK_PATH }}/debug -name "*.apk" | head -1)
          echo "APK: $APK"
          ls -lh "$APK"

      - name: 🏷️ Rename APK
        run: |
          VERSION=${{ steps.version.outputs.version_name }}
          mv ${{ env.APK_PATH }}/debug/app-debug.apk \
             ${{ env.APK_PATH }}/debug/pdp10-emulator-debug-${VERSION}.apk

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pdp10-debug-apk
          path: ${{ env.APK_PATH }}/debug/*.apk
          retention-days: 30


# =============================================================================
# JOB 3: Build Release APK (только при теге или ручном запуске)
# =============================================================================
  build-release:
    name: 🚀 Build Release APK
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release_type == 'release'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: 🐘 Setup Gradle ${{ env.GRADLE_VERSION }}
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: 🔢 Get version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION_NAME=${TAG#v}
          VERSION_CODE=${{ github.run_number }}
          echo "tag=$TAG"                   >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "📦 Release: $TAG → $VERSION_NAME ($VERSION_CODE)"

      # secrets.* нельзя в if: — проверяем через env → output
      - name: 🔍 Check keystore availability
        id: keystore_check
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "available=true"  >> $GITHUB_OUTPUT
            echo "✅ Keystore найден — APK будет подписан"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⚠️  KEYSTORE_BASE64 не задан — APK будет unsigned (см. SECRETS_SETUP.md)"
          fi

      - name: 🔐 Decode Keystore
        if: steps.keystore_check.outputs.available == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          echo "✅ keystore.jks создан"

      - name: 📝 Inject signing config into build.gradle
        if: steps.keystore_check.outputs.available == 'true'
        run: |
          cat >> app/build.gradle << 'GRADLE_EOF'

          android {
              signingConfigs {
                  release {
                      storeFile     file("${rootDir}/keystore.jks")
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias      System.getenv("KEY_ALIAS")
                      keyPassword   System.getenv("KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          GRADLE_EOF

      - name: 🚀 Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          gradle assembleRelease \
            -Pandroid.injected.version.code=${{ steps.version.outputs.version_code }} \
            -Pandroid.injected.version.name=${{ steps.version.outputs.version_name }} \
            --stacktrace

      - name: 🏷️ Rename Release APK
        run: |
          VERSION=${{ steps.version.outputs.version_name }}
          find ${{ env.APK_PATH }}/release -name "*.apk" \
            -exec mv {} ${{ env.APK_PATH }}/release/pdp10-emulator-${VERSION}.apk \;

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: pdp10-release-apk
          path: ${{ env.APK_PATH }}/release/pdp10-emulator-*.apk
          retention-days: 90


# =============================================================================
# JOB 4: GitHub Release (только при теге)
# =============================================================================
  github-release:
    name: 📢 GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: pdp10-release-apk
          path: release/

      - name: 📋 Generate Changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git describe --tags --abbrev=0 ${TAG}^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..${TAG} --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi

          cat > CHANGELOG.md << EOF
          ## PDP-10 Emulator ${TAG}

          ### Изменения
          ${CHANGES}

          ### Об эмуляторе
          - 🖥️ KA10/KI10 PDP-10 с 36-битной архитектурой
          - 🧠 256K слов оперативной памяти
          - ⌨️ Встроенный терминал (зелёный экран)
          - ⚙️ Ассемблер MACRO-10
          - 🔍 Дебаггер с дизассемблером
          - 📱 Требует Android 8.0+

          ### Установка
          1. Скачайте APK ниже
          2. Android: Настройки → Безопасность → Разрешить установку из неизвестных источников
          3. Откройте APK и установите
          EOF

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "PDP-10 Emulator ${{ github.ref_name }}"
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


# =============================================================================
# JOB 5: Summary
# =============================================================================
  summary:
    name: 📊 Build Summary
    runs-on: ubuntu-latest
    needs: [test, build-debug]
    if: always()

    steps:
      - name: 📊 Write Job Summary
        run: |
          echo "# 🖥️ PDP-10 Emulator Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Шаг | Статус |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Tests | ${{ needs.test.result == 'success' && '✅' || '❌' }} \`${{ needs.test.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Debug APK    | ${{ needs.build-debug.result == 'success' && '✅' || '❌' }} \`${{ needs.build-debug.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Коммит:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Ветка:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Триггер:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 APK доступен во вкладке **Actions → Artifacts**" >> $GITHUB_STEP_SUMMARY
